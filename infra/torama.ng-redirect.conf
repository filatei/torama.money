# Apache vhost: 301-redirect torama.ng → torama.money (single-primary SEO).
# torama.money and torama.ng share this server; this makes .ng permanently
# redirect to .money so all ranking signal consolidates on one domain.
#
# Install on the web host (139.162.170.253):
#   1. Get a TLS cert for torama.ng (needed for the :443 vhost below):
#        sudo certbot certonly --apache -d torama.ng -d www.torama.ng
#   2. sudo install -m644 torama.ng-redirect.conf /etc/apache2/sites-available/torama.ng.conf
#   3. sudo a2ensite torama.ng.conf && sudo apache2ctl configtest && sudo systemctl reload apache2
#   4. Verify:  curl -sI https://torama.ng/ | grep -i location   # → https://torama.money/
#
# NOTE: make sure torama.money is NOT a ServerAlias on the main torama.money vhost,
# or Apache will serve content on .ng instead of hitting this redirect vhost.

<VirtualHost *:80>
    ServerName torama.ng
    ServerAlias www.torama.ng
    # Preserve the path: /privacy.html on .ng → /privacy.html on .money
    RedirectPermanent / https://torama.money/
</VirtualHost>

<VirtualHost *:443>
    ServerName torama.ng
    ServerAlias www.torama.ng

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/torama.ng/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/torama.ng/privkey.pem

    RedirectPermanent / https://torama.money/
</VirtualHost>
